<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мой прогресс — ЦЭ English</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal:    #00B8AA;
    --teal-l:  #E0F9F7;
    --teal-m:  #AAEEE9;
    --orange:  #FF5500;
    --orange-l:#FFEDE3;
    --pink:    #EF3F99;
    --pink-l:  #FDE8F4;
    --ink:     #111111;
    --sub:     #666666;
    --muted:   #999999;
    --border:  #E4E4E4;
    --bg:      #FFFFFF;
    --off:     #F8F8F6;
    --sans:    'Geist', system-ui, sans-serif;
    --mono:    'Geist Mono', monospace;
  }
  html, body { background: var(--bg); }
  body {
    font-family: var(--sans); color: var(--ink);
    line-height: 1.5; padding: 18px 16px 92px;
    max-width: 480px; margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  .mono { font-family: var(--mono); }

  /* ── HEADER ── */
  .head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .ava {
    width: 46px; height: 46px; border-radius: 12px;
    background: var(--teal); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 19px;
  }
  .head-name { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }
  .head-lvl {
    font-family: var(--mono); font-size: 10.5px; color: var(--teal);
    background: var(--teal-l); border: 1px solid var(--teal-m);
    padding: 2px 9px; border-radius: 100px; display: inline-block; margin-top: 3px;
  }
  .streak {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    background: var(--off); border: 1px solid var(--border);
    border-radius: 12px; padding: 9px 13px;
  }
  .streak svg { color: var(--orange); }
  .streak-n { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--orange); }
  .streak-l { font-family: var(--mono); font-size: 9px; color: var(--muted); }

  /* ── XP ── */
  .xp-wrap { margin-bottom: 20px; }
  .xp-row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--sub); margin-bottom: 7px; }
  .xp-row b { color: var(--ink); }
  .xp-bar { height: 8px; background: var(--off); border: 1px solid var(--border); border-radius: 100px; overflow: hidden; }
  .xp-fill { height: 100%; width: 0%; background: var(--teal); border-radius: 100px; transition: width 1s cubic-bezier(.22,1,.36,1) .2s; }

  /* ── SCORE ── */
  .gauge-card {
    background: var(--off); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px;
    display: flex; align-items: center; gap: 18px; margin-bottom: 12px;
  }
  .ring { position: relative; width: 104px; height: 104px; flex: none; }
  .ring svg { transform: rotate(-90deg); display: block; }
  .ring-bg { fill: none; stroke: #ECECEA; stroke-width: 8; }
  .ring-fg {
    fill: none; stroke: var(--teal); stroke-width: 8; stroke-linecap: round;
    stroke-dasharray: 276; stroke-dashoffset: 276;
    transition: stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1) .25s;
  }
  .ring-num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-num b { font-size: 30px; font-weight: 700; letter-spacing: -1.5px; }
  .ring-num span { font-family: var(--mono); font-size: 9px; color: var(--muted); }
  .gauge-info h2 { font-size: 16px; letter-spacing: -0.3px; margin-bottom: 4px; }
  .gauge-info p { font-size: 12.5px; color: var(--sub); line-height: 1.55; }
  .delta {
    display: inline-block; margin-top: 9px;
    font-family: var(--mono); font-size: 10.5px; font-weight: 700;
    color: var(--teal); background: var(--teal-l);
    border: 1px solid var(--teal-m); padding: 3px 10px; border-radius: 100px;
  }

  /* ── QUEST ── */
  .quest {
    background: var(--bg); border: 1px solid var(--border);
    border-left: 3px solid var(--orange);
    border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 13px;
    margin-bottom: 24px; cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .quest:active { transform: scale(.98); }
  .quest-icon {
    width: 38px; height: 38px; flex: none; border-radius: 10px;
    background: var(--orange-l); color: var(--orange);
    display: flex; align-items: center; justify-content: center;
  }
  .quest-t { font-weight: 700; font-size: 14px; letter-spacing: -0.2px; }
  .quest-d { font-size: 12px; color: var(--sub); }
  .quest-go { margin-left: auto; font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--orange); white-space: nowrap; }

  /* ── SECTION LABELS ── */
  .sec-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 12px; }

  /* ── MAP ── */
  .map { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .lvl {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 13px;
    cursor: pointer; position: relative;
    transition: transform .15s ease, border-color .15s ease;
  }
  .lvl:active { transform: scale(.97); }
  .lvl-tag { font-family: var(--mono); font-size: 9.5px; color: var(--muted); margin-bottom: 2px; }
  .lvl-name { font-size: 12.5px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 9px; min-height: 32px; }
  .lvl-bar { height: 4px; background: var(--off); border-radius: 100px; overflow: hidden; margin-bottom: 6px; }
  .lvl-fill { height: 100%; border-radius: 100px; width: 0%; transition: width .9s ease .35s; }
  .lvl-pct { font-family: var(--mono); font-size: 10px; font-weight: 700; }
  .lvl.gold .lvl-fill { background: var(--teal); }
  .lvl.gold .lvl-pct  { color: var(--teal); }
  .lvl.mid .lvl-fill  { background: var(--orange); }
  .lvl.mid .lvl-pct   { color: var(--orange); }
  .lvl.low .lvl-fill  { background: var(--pink); }
  .lvl.low .lvl-pct   { color: var(--pink); }
  .lvl.low { border-color: #F6C8DF; }
  .lvl.zero .lvl-pct  { color: var(--muted); font-weight: 400; }
  .lvl .badge { position: absolute; top: 10px; right: 11px; color: var(--teal); }

  /* ── ACHIEVEMENTS ── */
  .ach-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 6px; scrollbar-width: none; }
  .ach-row::-webkit-scrollbar { display: none; }
  .ach {
    flex: none; width: 92px; text-align: center;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px 8px 11px;
  }
  .ach-ico {
    width: 34px; height: 34px; margin: 0 auto 7px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .ach.done .ach-ico { background: var(--teal-l); color: var(--teal); }
  .ach.done { border-color: var(--teal-m); }
  .ach.locked .ach-ico { background: var(--off); color: var(--muted); }
  .ach.locked .ach-name { color: var(--muted); }
  .ach-name { font-size: 10px; font-weight: 600; line-height: 1.3; }

  /* ── CTA ── */
  .cta {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-width: 480px; margin: 0 auto;
    padding: 12px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 40%);
  }
  .cta button {
    width: 100%; padding: 15px;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    font-family: var(--sans); font-size: 15px; font-weight: 700; letter-spacing: -0.2px;
    color: #fff; background: var(--ink);
    border: none; border-radius: 14px; cursor: pointer;
    transition: transform .15s ease, opacity .15s ease;
  }
  .cta button:active { transform: scale(.98); opacity: .85; }
  .cta button svg { color: var(--teal-m); }

  .fade { opacity: 0; transform: translateY(8px); animation: in .45s ease forwards; }
  @keyframes in { to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .fade { animation: none; opacity: 1; transform: none; }
    .xp-fill, .ring-fg, .lvl-fill { transition: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="head fade">
  <div class="ava" id="ava">К</div>
  <div>
    <div class="head-name" id="uname">Ксюша</div>
    <span class="head-lvl">lvl <b id="lvlNum">4</b> · знаток артиклей</span>
  </div>
  <div class="streak">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5.7c.4 3.6-.8 6.2-2.9 8.2-1.1 1.1-2.3 2-3.3 3.3C5.1 14.9 4.5 17.5 5.6 20c1.1 2.4 3.4 3.9 6.2 4 4.4.1 7.7-3.1 7.7-7.5 0-2.6-1.2-4.5-2.5-6.4-.3.8-.6 1.5-1.1 2.1-.3.4-1 .3-1.2-.2-1-2.7-1-5.2-.4-7.7.3-1.3-.4-3-.8-3.6z"/></svg>
    <div>
      <div class="streak-n"><span id="streakNum">7</span></div>
      <div class="streak-l">дней подряд</div>
    </div>
  </div>
</div>

<!-- XP -->
<div class="xp-wrap fade" style="animation-delay:.06s">
  <div class="xp-row"><span>// опыт</span><span><b id="xpNow">340</b> / <span id="xpNext">500</span> xp</span></div>
  <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
</div>

<!-- SCORE -->
<div class="gauge-card fade" style="animation-delay:.12s">
  <div class="ring">
    <svg width="104" height="104" viewBox="0 0 104 104">
      <circle class="ring-bg" cx="52" cy="52" r="44"/>
      <circle class="ring-fg" id="ringFg" cx="52" cy="52" r="44"/>
    </svg>
    <div class="ring-num"><b id="scoreNum">0</b><span>прогноз РИКЗ</span></div>
  </div>
  <div class="gauge-info">
    <h2>Прогноз балла</h2>
    <p>По последним пробным тестам и точности по разделам</p>
    <span class="delta">▲ +9 за месяц</span>
  </div>
</div>

<!-- QUEST -->
<div class="quest fade" style="animation-delay:.18s" id="questBtn">
  <div class="quest-icon">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </div>
  <div>
    <div class="quest-t">Квест дня</div>
    <div class="quest-d">Один вопрос — огонёк сохранён</div>
  </div>
  <div class="quest-go">+20 xp →</div>
</div>

<!-- MAP -->
<div class="sec-label fade" style="animation-delay:.22s">// карта разделов</div>
<div class="map" id="map"></div>

<!-- ACHIEVEMENTS -->
<div class="sec-label">// достижения</div>
<div class="ach-row" id="achRow"></div>

<!-- CTA -->
<div class="cta">
  <button id="trainBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    Тренировать слабый раздел
  </button>
</div>

<script>
  // ── Telegram WebApp ──
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#FFFFFF'); tg.setBackgroundColor('#FFFFFF'); }
  const tgUser = tg?.initDataUnsafe?.user;
  if (tgUser?.first_name) {
    document.getElementById('uname').textContent = tgUser.first_name;
    document.getElementById('ava').textContent = tgUser.first_name[0].toUpperCase();
  }

  // ── API бота (Railway). Пусто = демо-данные ──
  const API_URL = 'https://english-bot-production-40ef.up.railway.app';

  // ── Демо-данные (показываются вне Telegram или если API недоступен) ──
  const DEMO = {
    title: 'знаток артиклей',
    level: 4, xp: 340, xpNext: 500, streak: 7, score: 67,
    sections: [
      { tag: 'А1–А4',  name: 'Времена',          pct: 82 },
      { tag: 'А5',     name: 'Артикли',          pct: 91 },
      { tag: 'А6',     name: 'Детерминативы',    pct: 74 },
      { tag: 'А7',     name: 'Прилагательные',   pct: 65 },
      { tag: 'А8',     name: 'Степени сравн.',   pct: 70 },
      { tag: 'А9–А12', name: 'Лексика',          pct: 58 },
      { tag: 'А13',    name: 'Реплика-стимул',   pct: 77 },
      { tag: 'А14',    name: 'Диалог',           pct: 44 },
      { tag: 'А15–А18',name: 'Чтение',           pct: 69 },
      { tag: 'В1–В3',  name: 'Предлоги',         pct: 52 },
      { tag: 'В4–В6',  name: 'Одно слово',       pct: 38 },
      { tag: 'В7–В8',  name: 'Два предложения',  pct: 61 },
      { tag: 'В9–В18', name: 'Лишнее слово',     pct: 47 },
      { tag: 'В19–В22',name: 'Словообразование', pct: 0  },
    ],
    achievements: [
      { name: 'Неделя подряд',    done: true,  ico: 'flame'  },
      { name: '100 ответов',      done: true,  ico: 'check'  },
      { name: 'Король артиклей',  done: true,  ico: 'crown'  },
      { name: 'Тест за 60 минут', done: false, ico: 'clock'  },
      { name: 'Балл 80+',         done: false, ico: 'star'   },
      { name: '30 дней подряд',   done: false, ico: 'rocket' },
    ],
  };

  const ICONS = {
    flame:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5.7c.4 3.6-.8 6.2-2.9 8.2-1.1 1.1-2.3 2-3.3 3.3C5.1 14.9 4.5 17.5 5.6 20c1.1 2.4 3.4 3.9 6.2 4 4.4.1 7.7-3.1 7.7-7.5 0-2.6-1.2-4.5-2.5-6.4-.3.8-.6 1.5-1.1 2.1-.3.4-1 .3-1.2-.2-1-2.7-1-5.2-.4-7.7.3-1.3-.4-3-.8-3.6z"/></svg>',
    check:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
    crown:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.5 7l4.4 3.5L12 4l5.1 6.5L21.5 7l-1.8 11.5H4.3L2.5 7z"/></svg>',
    clock:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
    star:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6.6 7 .8-5.2 4.8 1.4 7L12 17.7 5.8 21.2l1.4-7L2 9.4l7-.8L12 2z"/></svg>',
    rocket: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.3-2 5-2 5s3.7-.5 5-2c.7-.8.7-2 0-2.8-.8-.7-2.2-.7-3 .8z"/><path d="M12 15l-3-3 8.5-8.5c1.5-1.5 4-1.5 4 0 0 0 0 2.5-1.5 4L12 15z"/><path d="M9 12H4l3-3M12 15v5l3-3"/></svg>',
  };

  // ── РЕНДЕР ──
  function render(DATA) {
    document.getElementById('lvlNum').textContent = DATA.level;
    document.querySelector('.head-lvl').innerHTML =
      `lvl <b>${DATA.level}</b> · ${DATA.title || 'ученик'}`;
    document.getElementById('streakNum').textContent = DATA.streak;
    document.getElementById('xpNow').textContent = DATA.xp;
    document.getElementById('xpNext').textContent = DATA.xpNext;

    requestAnimationFrame(() => {
      document.getElementById('xpFill').style.width = (DATA.xp / DATA.xpNext * 100) + '%';
      document.getElementById('ringFg').style.strokeDashoffset = 276 - 276 * DATA.score / 100;
    });

    (function count() {
      const el = document.getElementById('scoreNum');
      const start = performance.now();
      function step(now) {
        const p = Math.min((now - start) / 1300, 1);
        el.textContent = Math.round((1 - Math.pow(1 - p, 3)) * DATA.score);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    })();

    const map = document.getElementById('map');
    map.innerHTML = '';
    DATA.sections.forEach((s, i) => {
      const started = s.started !== undefined ? s.started : s.pct > 0;
      const cls = !started ? 'zero' : s.pct >= 75 ? 'gold' : s.pct >= 60 ? 'mid' : 'low';
      const el = document.createElement('div');
      el.className = `lvl ${cls} fade`;
      el.style.animationDelay = (.24 + i * .025) + 's';
      el.innerHTML = `
        ${s.pct >= 90 ? '<span class="badge">' + ICONS.crown + '</span>' : ''}
        <div class="lvl-tag">${s.tag}</div>
        <div class="lvl-name">${s.name}</div>
        <div class="lvl-bar"><div class="lvl-fill"></div></div>
        <div class="lvl-pct">${!started ? 'не начат' : s.pct + '%'}</div>`;
      map.appendChild(el);
      requestAnimationFrame(() => el.querySelector('.lvl-fill').style.width = s.pct + '%');
    });

    const achRow = document.getElementById('achRow');
    achRow.innerHTML = '';
    DATA.achievements.forEach(a => {
      const el = document.createElement('div');
      el.className = 'ach ' + (a.done ? 'done' : 'locked');
      el.innerHTML = `<div class="ach-ico">${ICONS[a.ico] || ICONS.star}</div><div class="ach-name">${a.name}</div>`;
      achRow.appendChild(el);
    });
  }

  // ── ЗАГРУЗКА: живые данные из бота, иначе демо ──
  async function load() {
    if (API_URL && tg?.initData) {
      try {
        const r = await fetch(API_URL + '/api/progress',
          { headers: { 'X-Tg-Init-Data': tg.initData } });
        if (r.ok) { render(await r.json()); return; }
      } catch (e) { /* падаем в демо */ }
    }
    render(DEMO);
  }
  load();

  async function sendToBot(cmd) {
    if (!tg) { alert('Откроется из Telegram: ' + cmd); return; }
    tg.HapticFeedback?.impactOccurred('light');
    // Через API — работает из любого контекста (кнопка меню, клавиатура)
    if (API_URL && tg.initData) {
      try {
        const r = await fetch(API_URL + '/api/action', {
          method: 'POST',
          headers: { 'X-Tg-Init-Data': tg.initData, 'Content-Type': 'application/json' },
          body: JSON.stringify({ cmd }),
        });
        if (r.ok) { tg.close(); return; }
      } catch (e) { /* fallback ниже */ }
    }
    // Запасной канал — работает, если открыто кнопкой клавиатуры
    try { tg.sendData(cmd); } catch (e) { tg.close(); }
  }
  document.getElementById('trainBtn').onclick = () => sendToBot('train_weak');
  document.getElementById('questBtn').onclick = ()
